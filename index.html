  .header {

    padding: 12px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding: 24px 32px; }
  .tab-content.active { display: block; }
  .chart-container { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 16px; margin-bottom: 20px; }
  .movers { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
  .mover-group { flex: 1; min-width: 280px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 16px; }
  .mover-group h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 12px; }
  .mover-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
  .mover-row .squad { color: var(--text); }
  .mover-row .delta { font-weight: 600; font-variant-numeric: tabular-nums; }
  .delta-up { color: var(--red); }
  .delta-down { color: var(--green); }
  .trend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
  .trend-card { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 20px; }
  .trend-card h3 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 4px; }
  .trend-card .current { font-size: 36px; font-weight: 700; margin-bottom: 12px; }

  .trend-card th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .trend-card td { padding: 8px 0; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .trend-card td:last-child { text-align: right; }
  .trend-card tr:last-child td { border-bottom: none; }
  .pct { font-weight: 600; }
  .pct-up { color: var(--red); }
  .pct-down { color: var(--green); }
  .pct-flat { color: var(--text-dim); }
  .squad-legend { padding: 12px 0; }
  .squad-legend-controls { display: flex; gap: 8px; margin-bottom: 8px; }
  .squad-legend-controls button {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 11px; padding: 3px 10px; cursor: pointer;
  }
  .squad-legend-controls button:hover { color: var(--text); border-color: var(--accent); }
  .squad-legend-items { display: flex; flex-wrap: wrap; gap: 8px 16px; }
  .squad-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .squad-legend-item.hidden { opacity: 0.35; }
  .squad-legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
  .custom-tooltip {
    position: fixed; pointer-events: none; z-index: 1000;
    background: rgba(26,29,39,0.95); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 14px; font-size: 12px;

  .custom-tooltip .tt-val { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .custom-tooltip .tt-total { margin-top: 4px; border-top: 1px solid var(--border); padding-top: 4px; font-weight: 600; color: var(--text); display: flex; justify-content: space-between; }

    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    window.dispatchEvent(new Event('resize'));
  });
});

// -- Stacked area chart --
function buildStackedArea(divId, seriesMap, totals, title) {
  const traces = [];
  const squads = D.squads;
  squads.forEach((sq, i) => {
    traces.push({
      x: D.dates, y: seriesMap[sq], name: sq,
      type: 'scatter', mode: 'none',
      fill: 'tonexty', stackgroup: 'one',
      fillcolor: squadColor(i),
      line: { width: 0.5, color: squadColor(i), shape: 'spline', smoothing: 1.0 },
      hoverinfo: 'none',
    });
  });
  traces.push({
    x: D.dates, y: totals, name: 'Total',
    type: 'scatter', mode: 'lines',
    line: { width: 2.5, color: '#ffffff', dash: 'dot', shape: 'spline', smoothing: 1.0 },
    hoverinfo: 'none',
  });

  const layout = {
    title: { text: title, font: { size: 16, color: '#e1e4ed' }, x: 0.01, y: 0.98, yanchor: 'top' },
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    font: { color: '#8b90a0', size: 12 },
    xaxis: {
      gridcolor: '#2e3344', linecolor: '#2e3344',
      rangeselector: {
        buttons: [
          { count: 1, label: '1M', step: 'month', stepmode: 'backward' },
          { count: 3, label: '3M', step: 'month', stepmode: 'backward' },
          { count: 6, label: '6M', step: 'month', stepmode: 'backward' },
          { step: 'all', label: 'All' },
        ],
        bgcolor: '#232734', activecolor: '#6c7ee1',
        font: { color: '#e1e4ed', size: 11 },
        x: 0.01, y: 1.06,
      },
    },
    yaxis: { gridcolor: '#2e3344', linecolor: '#2e3344', title: 'Overdue Issues' },
    showlegend: false,
    hovermode: 'x',
    margin: { l: 50, r: 20, t: 70, b: 40 },
  };

  Plotly.newPlot(divId, traces, layout, { responsive: true, displayModeBar: false });

  // Custom tooltip
  const chartEl = document.getElementById(divId);
  let tip = document.createElement('div');
  tip.className = 'custom-tooltip';
  tip.style.display = 'none';
  document.body.appendChild(tip);

  chartEl.on('plotly_hover', (e) => {
    const pt = e.points[0];
    if (!pt) return;
    const idx = pt.pointIndex;
    const dateStr = new Date(D.dates[idx]).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const entries = [];
    squads.forEach((sq, i) => {
      const v = seriesMap[sq][idx];
      if (v > 0) entries.push({ sq, v, color: squadColor(i) });
    });
    entries.sort((a, b) => b.v - a.v);
    let html = '<div class="tt-date">' + dateStr + '</div>';
    entries.forEach(e => {
      html += '<div class="tt-row"><div class="tt-swatch" style="background:' + e.color + '"></div><span class="tt-name">' + e.sq + '</span><span class="tt-val">' + e.v + '</span></div>';
    });
    html += '<div class="tt-total"><span>Total</span><span>' + totals[idx] + '</span></div>';
    tip.innerHTML = html;
    tip.style.display = 'block';
    const bx = chartEl.getBoundingClientRect();
    let left = e.event.clientX + 16;
    let top = e.event.clientY - 20;
    if (left + 280 > window.innerWidth) left = e.event.clientX - 296;
    if (top + tip.offsetHeight > window.innerHeight) top = window.innerHeight - tip.offsetHeight - 8;
    if (top < 0) top = 8;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  });
  chartEl.on('plotly_unhover', () => { tip.style.display = 'none'; });
  let rescaling = false;
  chartEl.on('plotly_relayout', (e) => {
    if (rescaling) return;
    if (e['xaxis.range[0]'] || e['xaxis.range[1]'] || e['xaxis.autorange']) {
      rescaling = true;
      const xa = chartEl.layout.xaxis;
      const x0 = xa.range ? new Date(xa.range[0]) : null;
      const x1 = xa.range ? new Date(xa.range[1]) : null;
      let maxY = 0;
      for (let k = 0; k < totals.length; k++) {
        if (x0 && x1) {
          const d = new Date(D.dates[k]);
          if (d < x0 || d > x1) continue;
        }
        if (totals[k] > maxY) maxY = totals[k];
      }
      Plotly.relayout(divId, { 'yaxis.range': [0, maxY * 1.08] }).then(() => { rescaling = false; });
    }
  });
}

// -- Legend with toggle --
function buildLegend(containerId, chartDivId, seriesMap) {
  const el = document.getElementById(containerId);
  const hidden = new Set();
  const items = [];

  function applyVisibility() {
    const vis = D.squads.map((_, j) => !hidden.has(j));
    vis.push(true);
    items.forEach((item, j) => item.classList.toggle('hidden', hidden.has(j)));
    Plotly.restyle(chartDivId, { visible: vis }).then(() => {
      const chartEl = document.getElementById(chartDivId);
      const xa = chartEl.layout.xaxis;
      const x0 = xa.range ? new Date(xa.range[0]) : null;
      const x1 = xa.range ? new Date(xa.range[1]) : null;
      let maxY = 0;
      for (let k = 0; k < D.dates.length; k++) {
        if (x0 && x1) {
          const d = new Date(D.dates[k]);
          if (d < x0 || d > x1) continue;
        }
        let stackVal = 0;
        D.squads.forEach((sq, j) => { if (!hidden.has(j)) stackVal += seriesMap[sq][k]; });
        if (stackVal > maxY) maxY = stackVal;
      }
      Plotly.relayout(chartDivId, { 'yaxis.range': [0, Math.max(maxY * 1.08, 1)] });
    });
  }

  const controls = document.createElement('div');
  controls.className = 'squad-legend-controls';
  const btnAll = document.createElement('button');
  btnAll.textContent = 'Select All';
  btnAll.addEventListener('click', () => { hidden.clear(); applyVisibility(); });
  const btnNone = document.createElement('button');
  btnNone.textContent = 'Deselect All';
  btnNone.addEventListener('click', () => { D.squads.forEach((_, i) => hidden.add(i)); applyVisibility(); });
  controls.appendChild(btnAll);
  controls.appendChild(btnNone);
  el.appendChild(controls);

  const row = document.createElement('div');
  row.className = 'squad-legend-items';
  D.squads.forEach((sq, i) => {
    const item = document.createElement('div');
    item.className = 'squad-legend-item';
    item.innerHTML = '<div class="squad-legend-swatch" style="background:' + squadColor(i) + '"></div>' + sq;
    item.addEventListener('click', () => {
      if (hidden.has(i)) hidden.delete(i); else hidden.add(i);
      applyVisibility();
    });
    row.appendChild(item);
    items.push(item);
  });
  el.appendChild(row);
}

// -- Movers --
function buildMovers(containerId, key) {
  const m = D.movers[key];
  const el = document.getElementById(containerId);
  let html = '';
  if (m.increases.length) {
    html += '<div class="mover-group"><h3>Biggest Increases (30d)</h3>';
    m.increases.forEach(d => {
      html += '<div class="mover-row"><span class="squad">' + d.squad + '</span>';
      html += '<span class="delta delta-up">+' + d.delta + ' (' + d.past + ' &rarr; ' + d.current + ')</span></div>';
    });
    html += '</div>';
  }
  if (m.decreases.length) {
    html += '<div class="mover-group"><h3>Biggest Decreases (30d)</h3>';
    m.decreases.forEach(d => {
      html += '<div class="mover-row"><span class="squad">' + d.squad + '</span>';
      html += '<span class="delta delta-down">' + d.delta + ' (' + d.past + ' &rarr; ' + d.current + ')</span></div>';
    });
    html += '</div>';
  }
  if (!m.increases.length && !m.decreases.length) {
    html = '<div class="mover-group"><h3>No significant changes in last 30 days</h3></div>';
  }
  el.innerHTML = html;
}

// -- Trend cards --
function buildTrends() {
  const grid = document.getElementById('trend-grid');
  const labels = {
    triage_moderate: 'Triage &mdash; Moderately Overdue (15-29 days)',
    triage_severe:   'Triage &mdash; Severely Overdue (30+ days)',
    fix_moderate:    'Fix &mdash; Moderately Overdue (0-29 days past SLA)',
    fix_severe:      'Fix &mdash; Severely Overdue (30+ days past SLA)',
  };
  const order = ['triage_moderate', 'triage_severe', 'fix_moderate', 'fix_severe'];

  order.forEach(key => {
    const t = D.trends[key];
    const card = document.createElement('div');
    card.className = 'trend-card';

    let rows = '';
    t.windows.forEach(w => {
      const sign = w.delta > 0 ? '+' : '';
      const cls = w.delta > 0 ? 'pct-up' : (w.delta < 0 ? 'pct-down' : 'pct-flat');
      const pctSign = w.pct > 0 ? '+' : '';
      rows += '<tr><td>Last ' + w.days + ' days</td>';
      rows += '<td>' + w.past + ' &rarr; ' + w.current + '</td>';
      rows += '<td><span class="pct ' + cls + '">' + pctSign + w.pct + '%</span>';
      rows += ' <span style="color:var(--text-dim)">(' + sign + w.delta + ')</span></td></tr>';
    });

    card.innerHTML =
      '<h3>' + labels[key] + '</h3>' +
      '<div class="current">' + t.current + '</div>' +
      '<div class="sparkline-container"><canvas id="spark-' + key + '" width="320" height="40"></canvas></div>' +
      '<table><thead><tr><th>Window</th><th>Then &rarr; Now</th><th style="text-align:right">Change</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>';

    grid.appendChild(card);

    // Draw sparkline on canvas
    const canvas = document.getElementById('spark-' + key);
    const ctx = canvas.getContext('2d');
    const data = t.sparkline;
    const w = canvas.width, h = canvas.height;
    const max = Math.max(...data, 1);
    const step = w / (data.length - 1 || 1);

    ctx.strokeStyle = t.current > (data[0] || 0) ? '#e55b5b' : '#4caf7d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = i * step;
      const y = h - (v / max) * (h - 4) - 2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Fill under
    ctx.lineTo((data.length - 1) * step, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = (t.current > (data[0] || 0) ? 'rgba(229,91,91,0.08)' : 'rgba(76,175,125,0.08)');
    ctx.fill();
  });
}

// -- Init --
buildStackedArea('triage-chart', D.triage, D.triageTotals, 'Overdue Triage Escalations by Squad');
buildStackedArea('fix-chart', D.fix, D.fixTotals, 'Overdue Fix Escalations by Squad');
buildLegend('triage-legend', 'triage-chart', D.triage);
buildLegend('fix-legend', 'fix-chart', D.fix);
buildMovers('triage-movers', 'triage');
buildMovers('fix-movers', 'fix');
buildTrends();
</script>
